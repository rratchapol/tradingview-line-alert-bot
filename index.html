<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TradingView LINE Alert Bot</title>
    <style>
      body {
        margin: 0;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #101820;
        color: #f5f7fa;
      }

      main {
        display: grid;
        min-height: 100vh;
        place-items: center;
        padding: 32px;
      }

      section {
        max-width: 720px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 32px;
        font-weight: 700;
      }

      p {
        margin: 0 0 16px;
        color: #c9d4df;
        line-height: 1.6;
      }

      code {
        border-radius: 6px;
        background: #1d2a35;
        color: #ffffff;
        padding: 3px 7px;
      }
    </style>
  </head>
  <body>
    <main>
      <section>
        <h1>TradingView LINE Alert Bot</h1>
        <p>
          This deployment is running. Use <code>/api/tradingview</code> as the
          TradingView webhook URL.
        </p>
        <p>
          The webhook endpoint accepts <code>POST</code> requests only. Use
          <code>/api/health</code> for a quick health check.
        </p>
      </section>
    </main>
  </body>
</html>
